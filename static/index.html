<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShieldPay</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #0a0a0f;
    color: #e8e8ed;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .container { width: 100%; max-width: 620px; }
  h1 { font-size: 36px; margin-bottom: 8px; letter-spacing: -0.5px; }
  .subtitle { color: #8a8a92; margin-bottom: 36px; font-size: 17px; }

  .card {
    background: #15151c;
    border: 1px solid #26262e;
    border-radius: 16px;
    padding: 32px;
    margin-bottom: 18px;
  }

  /* Upload zone */
  .drop-zone {
    border: 2px dashed #2e2e38;
    border-radius: 12px;
    padding: 56px 28px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
  }
  .drop-zone:hover, .drop-zone.dragover {
    border-color: #5b8cff;
    background: #1a1a24;
  }
  .drop-zone-text { color: #8a8a92; font-size: 16px; }
  .drop-zone-strong { color: #e8e8ed; font-weight: 600; font-size: 18px; margin-bottom: 8px; }
  input[type="file"] { display: none; }

  /* Tool call panel */
  .tool-panel { margin-top: 16px; }
  .tool-row {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 12px 16px;
    background: #0d0d12;
    border: 1px solid #26262e;
    border-radius: 8px;
    margin-top: 10px;
    font-size: 15px;
  }
  .tool-row .tool-icon {
    width: 14px;
    height: 14px;
    flex-shrink: 0;
  }
  .tool-row.pending .tool-icon {
    border: 2px solid #26262e;
    border-top-color: #5b8cff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  .tool-row.done .tool-icon {
    background: #6fde9b;
    border-radius: 50%;
  }
  .tool-row.error .tool-icon {
    background: #ff7b7b;
    border-radius: 50%;
  }
  .tool-name { color: #c8c8d0; font-weight: 500; flex: 1; }
  .tool-result {
    color: #8a8a92;
    font-size: 13px;
    font-family: "SF Mono", monospace;
    text-align: right;
    max-width: 280px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Bunq card visual */
  .bunq-card {
    background: linear-gradient(135deg, #1c1c28 0%, #2d2d40 100%);
    border-radius: 16px;
    padding: 28px;
    color: white;
    aspect-ratio: 1.586;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    box-shadow: 0 20px 40px rgba(0,0,0,0.5);
    margin-bottom: 20px;
    position: relative;
    overflow: hidden;
  }
  .bunq-card.shield { background: linear-gradient(135deg, #1a3a5c 0%, #2d5a8a 100%); }
  .bunq-card.trial { background: linear-gradient(135deg, #5c1a3a 0%, #8a2d5a 100%); }
  .bunq-card.cancelled { background: linear-gradient(135deg, #2a2a32 0%, #404048 100%); opacity: 0.6; }
  .card-label { font-size: 12px; letter-spacing: 2px; opacity: 0.7; }
  .card-number {
    font-family: "SF Mono", monospace;
    font-size: 24px;
    letter-spacing: 2px;
    margin: 14px 0;
  }
  .card-bottom { display: flex; justify-content: space-between; font-size: 12px; }
  .card-bottom strong { display: block; font-size: 16px; margin-top: 4px; letter-spacing: 0.5px; }

  /* Buttons */
  button {
    padding: 14px 22px;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    width: 100%;
    margin-top: 10px;
  }
  .btn-primary { background: #5b8cff; color: white; }
  .btn-primary:hover { background: #4a7cee; }
  .btn-primary:disabled { background: #2a2a32; color: #5a5a62; cursor: not-allowed; }
  .btn-secondary { background: #26262e; color: #e8e8ed; }
  .btn-secondary:hover { background: #30303a; }

  .hidden { display: none; }

  .reason { color: #c8c8d0; font-size: 16px; margin-top: 14px; line-height: 1.55; }
  .warning-panel {
    background: linear-gradient(135deg, #4a1414 0%, #2a0e0e 100%);
    border: 1px solid #6b2424;
    border-radius: 16px;
    padding: 32px 28px;
    margin-bottom: 18px;
  }
  .warning-label {
    color: #ff7b7b;
    font-size: 12px;
    letter-spacing: 1.5px;
    font-weight: 600;
    margin-bottom: 14px;
  }
  .warning-headline {
    color: #ffd6d6;
    font-size: 36px;
    font-weight: 700;
    letter-spacing: 0.5px;
    margin-bottom: 16px;
  }
  .warning-message {
    color: #f0c0c0;
    font-size: 16px;
    line-height: 1.55;
  }
  .default-card-notice {
    background: #1c2a1c;
    color: #b8e6b8;
    border: 1px solid #2c4a2c;
    border-radius: 8px;
    padding: 12px 14px;
    margin-top: 14px;
    font-size: 15px;
    line-height: 1.55;
  }
  .error { color: #ff7b7b; padding: 14px; background: #3a1414; border-radius: 8px; margin-top: 14px; font-size: 15px; }
</style>
</head>
<body>

<div class="container">
  <h1>ShieldPay</h1>
  <p class="subtitle">AI payment protection. Powered by Claude and bunq.</p>

  <!-- Upload state -->
  <div id="upload-state" class="card">
    <div class="drop-zone" id="drop-zone">
      <div class="drop-zone-strong">Drop a checkout screenshot here</div>
      <div class="drop-zone-text">or click to upload (receipt, bill, subscription page)</div>
      <input type="file" id="file-input" accept="image/*">
    </div>
  </div>

  <!-- Analyze state -->
  <div id="analyze-state" class="card hidden">
    <div class="card-label" style="color:#8a8a92; margin-bottom: 14px; font-size: 13px;">ANALYZING</div>
    <div class="tool-panel" id="tool-panel"></div>
  </div>

  <!-- Result state -->
  <div id="result-state" class="hidden">
    <div class="bunq-card" id="result-card">
      <div>
        <div class="card-label" id="card-label">SHIELD CARD</div>
        <div class="card-number" id="card-number">**** **** **** ****</div>
      </div>
      <div class="card-bottom">
        <div>
          CARDHOLDER
          <strong id="card-holder">-</strong>
        </div>
        <div>
          EXPIRES
          <strong id="card-expiry">-</strong>
        </div>
        <div>
          CVV
          <strong>***</strong>
        </div>
        <div>
          LIMIT
          <strong id="card-limit">-</strong>
        </div>
      </div>
    </div>
    <div id="warning-panel" class="warning-panel hidden">
      <div class="warning-label">PAYMENT BLOCKED</div>
      <div class="warning-headline">Do Not Pay</div>
      <div class="warning-message" id="warning-message"></div>
    </div>
    <div class="card">
      <div id="default-card-notice" class="default-card-notice hidden"></div>
      <div class="reason" id="result-reason"></div>
      <button class="btn-primary" id="pay-button">Simulate payment & cancel card</button>
      <button class="btn-secondary" id="reset-button">Start over</button>
    </div>
  </div>

  <div id="error-box" class="error hidden"></div>
</div>

<script>
const API = "";

let currentCardId = null;

// Agent state captured during the SSE stream.
let agentCardData = null;
let agentFinalMessage = null;
let agentFinalRisk = null;

const els = {
  uploadState: document.getElementById("upload-state"),
  analyzeState: document.getElementById("analyze-state"),
  resultState: document.getElementById("result-state"),
  dropZone: document.getElementById("drop-zone"),
  fileInput: document.getElementById("file-input"),
  toolPanel: document.getElementById("tool-panel"),
  resultCard: document.getElementById("result-card"),
  warningPanel: document.getElementById("warning-panel"),
  warningMessage: document.getElementById("warning-message"),
  cardLabel: document.getElementById("card-label"),
  cardNumber: document.getElementById("card-number"),
  cardHolder: document.getElementById("card-holder"),
  cardExpiry: document.getElementById("card-expiry"),
  cardLimit: document.getElementById("card-limit"),
  resultReason: document.getElementById("result-reason"),
  defaultCardNotice: document.getElementById("default-card-notice"),
  payButton: document.getElementById("pay-button"),
  resetButton: document.getElementById("reset-button"),
  errorBox: document.getElementById("error-box"),
};

// ---- File handling ----
els.dropZone.addEventListener("click", () => els.fileInput.click());
els.fileInput.addEventListener("change", (e) => {
  if (e.target.files[0]) handleFile(e.target.files[0]);
});
els.dropZone.addEventListener("dragover", (e) => {
  e.preventDefault();
  els.dropZone.classList.add("dragover");
});
els.dropZone.addEventListener("dragleave", () => {
  els.dropZone.classList.remove("dragover");
});
els.dropZone.addEventListener("drop", (e) => {
  e.preventDefault();
  els.dropZone.classList.remove("dragover");
  if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
});

async function handleFile(file) {
  showAnalyzeState();
  const formData = new FormData();
  formData.append("file", file);

  try {
    const response = await fetch(API + "/analyze-image-upload", {
      method: "POST",
      body: formData,
    });
    await readSSEStream(response);
  } catch (err) {
    showError(err.message);
  }
}

// ---- SSE stream reader ----
async function readSSEStream(response) {
  const reader = response.body.getReader();
  const decoder = new TextDecoder();
  let buffer = "";

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;

    buffer += decoder.decode(value, { stream: true });
    const lines = buffer.split("\n\n");
    buffer = lines.pop();

    for (const line of lines) {
      if (!line.startsWith("data: ")) continue;
      const event = JSON.parse(line.slice(6));

      if (event.type === "tool_start") {
        addToolRow(event.id, event.name);
      } else if (event.type === "tool_result") {
        completeToolRow(event.id, event.name, event.result);
        captureAgentState(event.name, event.result);
      } else if (event.type === "error") {
        showError(event.content);
      } else if (event.type === "done") {
        await finalize();
      }
    }
  }
}

// ---- Tool panel ----
const TOOL_LABELS = {
  extract_checkout_details: "Reading checkout image",
  lookup_merchant_reputation: "Checking merchant reputation",
  get_user_recent_transactions: "Reviewing transaction history",
  create_shield_card: "Creating shield card",
  notify_user: "Finalizing recommendation",
};

function addToolRow(id, name) {
  const row = document.createElement("div");
  row.id = "tool-" + id;
  row.className = "tool-row pending";
  row.innerHTML =
    '<span class="tool-icon"></span>' +
    '<span class="tool-name">' + (TOOL_LABELS[name] || name) + '</span>' +
    '<span class="tool-result">running...</span>';
  els.toolPanel.appendChild(row);
}

function completeToolRow(id, name, result) {
  const row = document.getElementById("tool-" + id);
  if (!row) return;
  const isError = result && result.error;
  row.className = "tool-row " + (isError ? "error" : "done");
  row.querySelector(".tool-result").textContent = summarizeResult(name, result);
}

function summarizeResult(name, result) {
  if (!result) return "ok";
  if (result.error) return "error";
  if (name === "extract_checkout_details") {
    return (result.merchant || "?") + " - " + (result.currency || "") + " " + (result.amount || 0);
  }
  if (name === "lookup_merchant_reputation") return result.reputation || "ok";
  if (name === "get_user_recent_transactions") return result.paid_before ? "paid before" : "no history";
  if (name === "create_shield_card") return result.created ? result.masked_number : "skipped";
  if (name === "notify_user") return (result.risk || "") + " risk";
  return "ok";
}

function captureAgentState(name, result) {
  if (name === "create_shield_card" && result && result.created) {
    agentCardData = result;
  } else if (name === "notify_user" && result) {
    agentFinalMessage = result.message;
    agentFinalRisk = result.risk;
  }
}

// ---- Result rendering ----
async function finalize() {
  if (agentFinalRisk === "high") {
    showWarning(agentFinalMessage || "This checkout looks unsafe.");
    return;
  }

  if (agentCardData) {
    currentCardId = agentCardData.card_id;
    showResult({
      label: agentCardData.second_line || "SHIELD CARD",
      cardClass: agentCardData.scenario === "free_trial" ? "trial" : "shield",
      number: agentCardData.masked_number,
      holder: agentCardData.name_on_card || "-",
      expiry: formatExpiry(agentCardData.expiry_date),
      limit: "EUR " + agentCardData.limit,
      reason: agentFinalMessage || "Shield card created.",
      noCancel: false,
    });
    return;
  }

  const defaultCard = await fetchDefaultCard();
  if (!defaultCard) return;

  showResult({
    label: defaultCard.second_line || "MAIN CARD",
    cardClass: "shield",
    number: defaultCard.masked_number,
    holder: defaultCard.name_on_card || "-",
    expiry: formatExpiry(defaultCard.expiry_date),
    limit: "Default",
    reason: agentFinalMessage || "Trusted merchant. No protection needed.",
    noCancel: true,
  });

  if (defaultCard.created_now) {
    els.defaultCardNotice.textContent =
      "No default virtual card found on your bunq account. We just created one for you.";
    els.defaultCardNotice.classList.remove("hidden");
  }
}

function showWarning(message) {
  els.resultCard.classList.add("hidden");
  els.warningPanel.classList.remove("hidden");
  els.warningMessage.textContent = message;
  els.resultReason.textContent = "";
  els.payButton.classList.add("hidden");
  els.resultState.classList.remove("hidden");
}

async function fetchDefaultCard() {
  try {
    const resp = await fetch(API + "/default-card");
    if (!resp.ok) {
      showError("Could not load default card: " + (await resp.text()));
      return null;
    }
    return await resp.json();
  } catch (err) {
    showError("Default card request failed: " + err.message);
    return null;
  }
}

function formatExpiry(dateStr) {
  if (!dateStr) return "-";
  const parts = dateStr.split("-");
  return parts[1] + "/" + parts[0].slice(2);
}

// ---- UI state ----
function showAnalyzeState() {
  els.uploadState.classList.add("hidden");
  els.resultState.classList.add("hidden");
  els.errorBox.classList.add("hidden");
  els.analyzeState.classList.remove("hidden");
  els.toolPanel.innerHTML = "";
  els.defaultCardNotice.classList.add("hidden");
  els.defaultCardNotice.textContent = "";

  agentCardData = null;
  agentFinalMessage = null;
  agentFinalRisk = null;
}

function showResult({ label, cardClass, number, holder, expiry, limit, reason, noCancel }) {
  els.resultCard.classList.remove("hidden");
  els.warningPanel.classList.add("hidden");
  els.resultCard.className = "bunq-card " + cardClass;
  els.cardLabel.textContent = label;
  els.cardNumber.textContent = number;
  els.cardHolder.textContent = holder;
  els.cardExpiry.textContent = expiry;
  els.cardLimit.textContent = limit;
  els.resultReason.textContent = reason;
  els.payButton.classList.toggle("hidden", noCancel);
  els.resultState.classList.remove("hidden");
}

function showError(msg) {
  els.errorBox.textContent = "Error: " + msg;
  els.errorBox.classList.remove("hidden");
}

// ---- Pay & cancel ----
els.payButton.addEventListener("click", async () => {
  if (!currentCardId) return;
  els.payButton.disabled = true;
  els.payButton.textContent = "Processing payment...";

  await new Promise(r => setTimeout(r, 800));

  try {
    const resp = await fetch(API + "/cancel-card", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ card_id: currentCardId }),
    });
    if (!resp.ok) {
      const errText = await resp.text();
      throw new Error("Cancel failed: " + errText);
    }

    els.resultCard.classList.add("cancelled");
    els.cardLabel.textContent = "PAYMENT COMPLETE - CARD CANCELLED";
    els.payButton.textContent = "Card cancelled. Your main card is safe.";
  } catch (err) {
    showError(err.message);
    els.payButton.disabled = false;
  }
});

els.resetButton.addEventListener("click", () => {
  currentCardId = null;
  els.uploadState.classList.remove("hidden");
  els.analyzeState.classList.add("hidden");
  els.resultState.classList.add("hidden");
  els.errorBox.classList.add("hidden");
  els.fileInput.value = "";
  els.payButton.disabled = false;
  els.payButton.textContent = "Simulate payment & cancel card";
});
</script>

</body>
</html>
